  # =========================================
  # NOTIFICATIONS
  # =========================================
  notify-success:
    name: 📬 Telegram — Succès
    runs-on: ubuntu-latest
    needs: [docker, deploy]
    if: success()
    steps:
      - name: ✅ Notification succès
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${{ secrets.TELEGRAM_CHAT_ID }}\",
              \"text\": \"✅ *${{github.repository}} — Déployé*\n\n💬 *Service* : ${{github.repository}}\n🏷️ *Version* : \`${{ needs.docker-build.outputs.image_version }}\`\n👤 *Auteur* : ${{ github.actor }}\n📝 *SHA* : \`${GITHUB_SHA::8}\`\n🔗 [Voir workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\",
              \"parse_mode\": \"Markdown\"
            }"

  notify-failure:
    name: 📬 Telegram — Échec
    runs-on: ubuntu-latest
    needs: [docker, deploy]
    if: failure()
    steps:
      - name: ❌ Notification échec
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${{ secrets.TELEGRAM_CHAT_ID }}\",
              \"text\": \"❌ *${{github.repository}} — Échec Déploiement*\n\n👤 *Auteur* : ${{ github.actor }}\n📝 *SHA* : \`${GITHUB_SHA::8}\`\n🔗 [🔍 Voir logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\",
              \"parse_mode\": \"Markdown\"
            }"