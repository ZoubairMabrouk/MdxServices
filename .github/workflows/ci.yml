name: ci

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-test-publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/*.sln

      - name: Restore
        run: dotnet restore "./MdxServices.sln"

      - name: Build (Release)
        run: dotnet build "./MdxServices.sln" -c Release --no-restore

      - name: Test
        run: dotnet test "./MdxServices.sln" -c Release --no-build --verbosity normal

      - name: Smoke test (start API and fetch swagger)
        shell: pwsh
        env:
          ASPNETCORE_ENVIRONMENT: Development
        run: |
          $port = 5055
          $url = "http://127.0.0.1:$port"
          $swagger = "$url/swagger/v1/swagger.json"

          $proc = Start-Process -FilePath "dotnet" -ArgumentList @("run","--project","./MdxServices.csproj","--no-build","-c","Release","--urls",$url) -PassThru -NoNewWindow
          try {
            $deadline = (Get-Date).AddSeconds(30)
            while ((Get-Date) -lt $deadline) {
              try {
                $resp = Invoke-WebRequest -Uri $swagger -UseBasicParsing -TimeoutSec 3
                if ($resp.StatusCode -eq 200) {
                  "Smoke test OK: $swagger"
                  break
                }
              } catch {
                Start-Sleep -Seconds 1
              }
            }

            if ((Get-Date) -ge $deadline) {
              throw "Smoke test failed: $swagger did not respond within 30s."
            }
          } finally {
            if ($null -ne $proc -and -not $proc.HasExited) {
              Stop-Process -Id $proc.Id -Force
            }
          }

      - name: Publish API
        run: dotnet publish "./MdxServices.csproj" -c Release --no-build -o "./artifacts/publish"

      - name: Upload published artifact
        uses: actions/upload-artifact@v4
        with:
          name: mdxservices-publish
          path: ./artifacts/publish
          if-no-files-found: error

  docker:
    runs-on: ubuntu-latest
    needs: build-test-publish
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR (push only on master)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha

      - name: Build (and push on master)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
  deploy:
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          key: ${{ secrets.VPS_SSH_KEY }}
          username: ${{ secrets.VPS_USER }}
          port: 22
          debug: true
          timeout: 180s
          command_timeout: 30m
          script: |
            set -e

            echo "Logging in to GHCR"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "Pulling latest image"
            docker pull ghcr.io/zoubairmabrouk/mdxservices:latest

            echo "Stopping existing container if present"
            docker rm -f mdxservices || true

            echo "Running latest container"
            docker run -d \
              --name mdxservices \
              --restart unless-stopped \
              -p 8085:8080 \
              -e "Jwt__SecretKey=${{ secrets.JWT_SECRET_KEY }}" \
              -e "Jwt__Issuer=${{ secrets.JWT_ISSUER }}" \
              -e "Jwt__Audience=${{ secrets.JWT_AUDIENCE }}" \
              -e "ConnectionStrings__DefaultConnection=${{ secrets.DB_CONNECTION_STRING }}" \
              -e "ASPNETCORE_ENVIRONMENT=Production" \
              ghcr.io/zoubairmabrouk/mdxservices:latest

            echo "Deployment completed successfully"
            docker ps --filter "name=mdxservices" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
