name: ci

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-test-publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/*.sln

      - name: Restore
        run: dotnet restore "./MdxServices.sln"

      - name: Build (Release)
        run: dotnet build "./MdxServices.sln" -c Release --no-restore

      - name: Test
        run: dotnet test "./MdxServices.sln" -c Release --no-build --verbosity normal

      - name: Smoke test (start API and fetch swagger)
        shell: pwsh
        env:
          ASPNETCORE_ENVIRONMENT: Development
        run: |
          $port = 5055
          $url = "http://127.0.0.1:$port"
          $swagger = "$url/swagger/v1/swagger.json"

          $proc = Start-Process -FilePath "dotnet" -ArgumentList @("run","--project","./MdxServices.csproj","--no-build","-c","Release","--urls",$url) -PassThru -NoNewWindow
          try {
            $deadline = (Get-Date).AddSeconds(30)
            while ((Get-Date) -lt $deadline) {
              try {
                $resp = Invoke-WebRequest -Uri $swagger -UseBasicParsing -TimeoutSec 3
                if ($resp.StatusCode -eq 200) {
                  "Smoke test OK: $swagger"
                  break
                }
              } catch {
                Start-Sleep -Seconds 1
              }
            }

            if ((Get-Date) -ge $deadline) {
              throw "Smoke test failed: $swagger did not respond within 30s."
            }
          } finally {
            if ($null -ne $proc -and -not $proc.HasExited) {
              Stop-Process -Id $proc.Id -Force
            }
          }

      - name: Publish API
        run: dotnet publish "./MdxServices.csproj" -c Release --no-build -o "./artifacts/publish"

      - name: Upload published artifact
        uses: actions/upload-artifact@v4
        with:
          name: mdxservices-publish
          path: ./artifacts/publish
          if-no-files-found: error

  docker:
    runs-on: ubuntu-latest
    needs: build-test-publish
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR (push only on master)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha

      - name: Build (and push on master)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
